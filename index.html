<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora Simples</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f2f2f2;
    }

    .calculadora {
      background: #222;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    #display {
      width: 100%;
      height: 60px;
      font-size: 28px;
      text-align: right;
      padding: 10px;
      border: none;
      border-radius: 10px;
      margin-bottom: 15px;
      background: #fff;
      color: #000;
    }

    .botoes {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 55px;
      font-size: 22px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #444;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      background: #666;
    }

    .operador {
      background: #ff9500;
    }

    .operador:hover {
      background: #e08900;
    }

    .limpar {
      background: #d9534f;
    }

    .limpar:hover {
      background: #c9302c;
    }

    .igual {
      background: #28a745;
      grid-column: span 2;
    }

    .igual:hover {
      background: #218838;
    }

    .zero {
      grid-column: span 2;
    }
  </style>
</head>
<body>

  <div class="calculadora">
    <input type="text" id="display" disabled />

    <div class="botoes">
      <button class="limpar" onclick="limpar()">C</button>
      <button onclick="apagar()">⌫</button>
      <button onclick="adicionar('%')">%</button>
      <button class="operador" onclick="adicionar('/')">÷</button>

      <button onclick="adicionar('7')">7</button>
      <button onclick="adicionar('8')">8</button>
      <button onclick="adicionar('9')">9</button>
      <button class="operador" onclick="adicionar('*')">×</button>

      <button onclick="adicionar('4')">4</button>
      <button onclick="adicionar('5')">5</button>
      <button onclick="adicionar('6')">6</button>
      <button class="operador" onclick="adicionar('-')">−</button>

      <button onclick="adicionar('1')">1</button>
      <button onclick="adicionar('2')">2</button>
      <button onclick="adicionar('3')">3</button>
      <button class="operador" onclick="adicionar('+')">+</button>

      <button class="zero" onclick="adicionar('0')">0</button>
      <button onclick="adicionar('.')">.</button>
      <button class="igual" onclick="calcular()">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");

    function adicionar(valor) {
      display.value += valor;
    }

    function limpar() {
      display.value = "";
    }

    function apagar() {
      display.value = display.value.slice(0, -1);
    }

    function calcular() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = "Erro";
      }
    }
  </script>

</body>
</html>
